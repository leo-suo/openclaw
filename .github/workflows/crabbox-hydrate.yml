name: Crabbox Hydrate

on:
  workflow_dispatch:
    inputs:
      crabbox_id:
        description: "Crabbox lease ID"
        required: true
        type: string
      ref:
        description: "Git ref to hydrate"
        required: false
        type: string
      crabbox_runner_label:
        description: "Dynamic Crabbox runner label"
        required: true
        type: string
      crabbox_job:
        description: "Hydration job identifier expected by Crabbox"
        required: false
        default: "hydrate"
        type: string
      crabbox_keep_alive_minutes:
        description: "Minutes to keep the hydrated job alive"
        required: false
        default: "90"
        type: string
      crabbox_docker_cache:
        description: "Prepare OpenClaw Docker/buildx cache for Crabbox runs"
        required: false
        default: "false"
        type: string
      crabbox_docker_prepare_images:
        description: "Build shared OpenClaw Docker E2E images during hydration"
        required: false
        default: "false"
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OPENCLAW_CRABBOX_DOCKER_CACHE: /var/cache/crabbox/openclaw-docker-buildx
  OPENCLAW_CRABBOX_DOCKER_CACHE_NEXT: /var/cache/crabbox/openclaw-docker-buildx-next
  OPENCLAW_CRABBOX_DOCKER_E2E_BARE_IMAGE: openclaw-docker-e2e-bare:crabbox
  OPENCLAW_CRABBOX_DOCKER_E2E_FUNCTIONAL_IMAGE: openclaw-docker-e2e-functional:crabbox

jobs:
  hydrate:
    name: hydrate
    runs-on: [self-hosted, "${{ inputs.crabbox_runner_label }}"]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Prepare Crabbox shell
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags --depth=50 origin "+refs/heads/main:refs/remotes/origin/main"

          node_bin="$(dirname "$(node -p 'process.execPath')")"
          pnpm_bin="$(command -v pnpm)"
          sudo ln -sf "$node_bin/node" /usr/local/bin/node
          sudo ln -sf "$node_bin/npm" /usr/local/bin/npm
          sudo ln -sf "$node_bin/npx" /usr/local/bin/npx
          sudo ln -sf "$node_bin/corepack" /usr/local/bin/corepack
          sudo ln -sf "$pnpm_bin" /usr/local/bin/pnpm

      - name: Prepare Docker cache
        if: inputs.crabbox_docker_cache == 'true' || inputs.crabbox_docker_prepare_images == 'true'
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            n=1
            until "$@"; do
              if [ "$n" -ge 5 ]; then
                return 1
              fi
              sleep $((n * 5))
              n=$((n + 1))
            done
          }

          sudo mkdir -p "$OPENCLAW_CRABBOX_DOCKER_CACHE"
          sudo chown -R "$(id -un):$(id -gn)" /var/cache/crabbox

          if ! command -v docker >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            retry sudo apt-get update
            retry sudo apt-get install -y --no-install-recommends docker.io
          fi
          sudo systemctl enable --now docker
          if ! docker info >/dev/null 2>&1; then
            sudo usermod -aG docker "$(id -un)" || true
            sudo chmod 666 /var/run/docker.sock || true
          fi
          docker info >/dev/null

          if ! docker buildx version >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            retry sudo apt-get update
            retry sudo apt-get install -y --no-install-recommends docker-buildx || true
          fi
          if docker buildx version >/dev/null 2>&1; then
            docker buildx create --name openclaw-crabbox --driver docker-container --use >/dev/null 2>&1 || docker buildx use openclaw-crabbox
            docker buildx inspect --bootstrap >/dev/null
          fi

      - name: Build shared Docker E2E images
        if: inputs.crabbox_docker_prepare_images == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if docker buildx version >/dev/null 2>&1; then
            export OPENCLAW_DOCKER_BUILD_USE_BUILDX=1
            export OPENCLAW_DOCKER_BUILD_CACHE_FROM="type=local,src=${OPENCLAW_CRABBOX_DOCKER_CACHE}"
            export OPENCLAW_DOCKER_BUILD_CACHE_TO="type=local,dest=${OPENCLAW_CRABBOX_DOCKER_CACHE_NEXT},mode=max"
          fi
          OPENCLAW_DOCKER_E2E_IMAGE="$OPENCLAW_CRABBOX_DOCKER_E2E_BARE_IMAGE" OPENCLAW_DOCKER_E2E_TARGET=bare pnpm test:docker:e2e-build
          OPENCLAW_DOCKER_E2E_IMAGE="$OPENCLAW_CRABBOX_DOCKER_E2E_FUNCTIONAL_IMAGE" OPENCLAW_DOCKER_E2E_TARGET=functional pnpm test:docker:e2e-build

      - name: Hydrate provider env helper
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY_OLD: ${{ secrets.ANTHROPIC_API_KEY_OLD }}
          ANTHROPIC_API_TOKEN: ${{ secrets.ANTHROPIC_API_TOKEN }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          Z_AI_API_KEY: ${{ secrets.Z_AI_API_KEY }}
        run: bash scripts/ci-hydrate-testbox-env.sh

      - name: Mark Crabbox ready
        shell: bash
        run: |
          set -euo pipefail
          job="${{ inputs.crabbox_job }}"
          if [ -z "$job" ]; then job=hydrate; fi
          mkdir -p "$HOME/.crabbox/actions"
          state="$HOME/.crabbox/actions/${{ inputs.crabbox_id }}.env"
          env_file="$HOME/.crabbox/actions/${{ inputs.crabbox_id }}.env.sh"
          services_file="$HOME/.crabbox/actions/${{ inputs.crabbox_id }}.services"
          write_export() {
            key="$1"
            value="${!key-}"
            if [ -n "$value" ]; then
              printf 'export %s=%q\n' "$key" "$value"
            fi
          }
          {
            if [ "${{ inputs.crabbox_docker_cache }}" = "true" ] || [ "${{ inputs.crabbox_docker_prepare_images }}" = "true" ]; then
              export OPENCLAW_DOCKER_BUILD_ON_MISSING=1
              if docker buildx version >/dev/null 2>&1; then
                export OPENCLAW_DOCKER_BUILD_USE_BUILDX=1
                export OPENCLAW_DOCKER_BUILD_CACHE_FROM="type=local,src=${OPENCLAW_CRABBOX_DOCKER_CACHE}"
                export OPENCLAW_DOCKER_BUILD_CACHE_TO="type=local,dest=${OPENCLAW_CRABBOX_DOCKER_CACHE_NEXT},mode=max"
              fi
            fi
            if [ "${{ inputs.crabbox_docker_prepare_images }}" = "true" ]; then
              export OPENCLAW_DOCKER_E2E_BARE_IMAGE="$OPENCLAW_CRABBOX_DOCKER_E2E_BARE_IMAGE"
              export OPENCLAW_DOCKER_E2E_FUNCTIONAL_IMAGE="$OPENCLAW_CRABBOX_DOCKER_E2E_FUNCTIONAL_IMAGE"
            fi
            for key in CI GITHUB_ACTIONS GITHUB_WORKSPACE GITHUB_REPOSITORY GITHUB_RUN_ID GITHUB_RUN_NUMBER GITHUB_RUN_ATTEMPT GITHUB_REF GITHUB_REF_NAME GITHUB_SHA GITHUB_EVENT_NAME GITHUB_ACTOR RUNNER_OS RUNNER_ARCH RUNNER_TEMP RUNNER_TOOL_CACHE OPENCLAW_DOCKER_BUILD_ON_MISSING OPENCLAW_DOCKER_BUILD_USE_BUILDX OPENCLAW_DOCKER_BUILD_CACHE_FROM OPENCLAW_DOCKER_BUILD_CACHE_TO OPENCLAW_DOCKER_E2E_BARE_IMAGE OPENCLAW_DOCKER_E2E_FUNCTIONAL_IMAGE; do
              write_export "$key"
            done
          } > "${env_file}.tmp"
          mv "${env_file}.tmp" "$env_file"
          {
            echo "# Docker containers visible from the hydrated runner"
            docker ps --format '{{.Names}}\t{{.Image}}\t{{.Ports}}' 2>/dev/null || true
          } > "${services_file}.tmp"
          mv "${services_file}.tmp" "$services_file"
          tmp="${state}.tmp"
          {
            echo "WORKSPACE=${GITHUB_WORKSPACE}"
            echo "RUN_ID=${GITHUB_RUN_ID}"
            echo "JOB=${job}"
            echo "ENV_FILE=${env_file}"
            echo "SERVICES_FILE=${services_file}"
            echo "READY_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$tmp"
          mv "$tmp" "$state"

      - name: Keep Crabbox job alive
        shell: bash
        run: |
          set -euo pipefail
          minutes="${{ inputs.crabbox_keep_alive_minutes }}"
          case "$minutes" in
            ''|*[!0-9]*) minutes=90 ;;
          esac
          stop="$HOME/.crabbox/actions/${{ inputs.crabbox_id }}.stop"
          deadline=$(( $(date +%s) + minutes * 60 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            if [ -f "$stop" ]; then
              exit 0
            fi
            sleep 15
          done

      - name: Summarize Docker cache
        if: always() && (inputs.crabbox_docker_cache == 'true' || inputs.crabbox_docker_prepare_images == 'true')
        shell: bash
        run: |
          docker system df || true
